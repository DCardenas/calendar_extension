name: Build and Zip Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project (Compile TypeScript)
        run: npm run build

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dropply-extension
          path: |
            manifest.json
            dist/
            libs/
            res/
            content.css
            PRIVACY.md
          retention-days: 5
