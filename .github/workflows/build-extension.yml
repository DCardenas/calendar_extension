name: Build and Zip Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project (Compile TypeScript)
        run: npm run build

      - name: Create Extension Zip
        run: |
          zip -r dropply-extension.zip \
            manifest.json \
            dist \
            libs \
            res \
            content.css \
            PRIVACY.md \
            -x "*.ts" "*.map" "node_modules/*"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dropply-extension
          path: dropply-extension.zip
          retention-days: 5
