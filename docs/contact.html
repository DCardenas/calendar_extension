<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Support - Dropply</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">📧</div>
      <h1>Contact Support</h1>
      <h2>How can we help?</h2>
    </header>

    <main class="content-box">
      <form id="contact-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" required placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" required placeholder="Reason for contact">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" required rows="8" placeholder="Please describe your issue or feedback in detail..."></textarea>
        </div>
        <button type="submit" class="btn">Send Email</button>
      </form>
    </main>

    <script>
      document.getElementById('contact-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const subject = document.getElementById('subject').value;
        const message = document.getElementById('message').value;
        const body = `Name: ${name}\n\nMessage:\n${message}`;
        const mailtoLink = `mailto:cardenas.danielr@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        window.location.href = mailtoLink;
      });
    </script>

    <footer>
      <p>&copy; 2026 Dropply by Daniel Cardenas</p>
      <p>
        <a href="index.html">Home</a> | 
        <a href="contact.html">Contact</a> | 
        <a href="privacy.html">Privacy Policy</a> | 
        <a href="tos.html">Terms of Service</a>
      </p>
    </footer>
  </div>
</body>
</html>
